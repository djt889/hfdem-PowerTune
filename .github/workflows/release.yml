name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build ZIP
        run: |
          zip -r "hfdem-PowerTune-${{ steps.version.outputs.VERSION }}.zip" . -x ".git/*" -x ".github/*" -x "*.md" -x ".gitignore"

      - name: Check prerelease
        id: prerelease
        run: |
          if echo "${{ steps.version.outputs.VERSION }}" | grep -qiE "(beta|alpha|rc|pre|dev)"; then
            echo "IS_PRERELEASE=true" >> $GITHUB_OUTPUT
          else
            echo "IS_PRERELEASE=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: hfdem PowerTune ${{ steps.version.outputs.VERSION }}
          body: |
            ## hfdem PowerTune ${{ steps.version.outputs.VERSION }}
            
            基于 hfdem 内核及 schedhorizon 调度的功耗管理模块。
            
            ### 安装方法
            1. 下载 `hfdem-PowerTune-${{ steps.version.outputs.VERSION }}.zip`
            2. 在 KernelSU 管理器中从本地安装
            3. 重启生效
          files: hfdem-PowerTune-${{ steps.version.outputs.VERSION }}.zip
          draft: false
          prerelease: ${{ steps.prerelease.outputs.IS_PRERELEASE == 'true' }}
